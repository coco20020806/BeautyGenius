[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "api-server"
version = "0.1.0"
description = "FastAPI access layer for Beauty Genius makeup tasks"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
  "python-multipart>=0.0.12",
  "Pillow>=10.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["api_server*"]
