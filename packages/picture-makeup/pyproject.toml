[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "picture-makeup"
version = "0.1.0"
description = "Per-step makeup diagram generation (picture-makeup skill) for Beauty Genius"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "dashscope>=1.24.6",
  "Pillow>=10.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["picture_makeup*"]
